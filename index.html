<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能网页变声器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #f4f0ff 100%);
            min-height: 100vh;
        }

        /* 简单的波纹动画，用于录音和播放时的视觉反馈 */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .recording-pulse {
            animation: pulse-ring 2s infinite;
        }
        
        .playing-pulse {
            animation: pulse-ring 2s infinite;
            border-radius: 50%;
            /* 播放时用薄荷绿的波纹 */
            box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.6); 
        }
        @keyframes pulse-ring-play {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(20, 184, 166, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
        }
        .playing-pulse {
            animation: pulse-ring-play 2s infinite;
        }

        /* 隐藏原生文件上传按钮 */
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 bg-gradient-to-br from-teal-50 via-emerald-50 to-cyan-50">

    <div class="bg-white rounded-[2rem] shadow-[0_10px_40px_rgba(20,184,166,0.15)] w-full max-w-md overflow-hidden border border-white">
        <!-- 头部 -->
        <div class="pt-8 pb-4 text-center">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <div class="bg-gradient-to-br from-teal-400 to-emerald-400 p-2 rounded-xl text-white shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                </div>
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-teal-500 to-emerald-500">魔法变声器</span>
            </h1>
            <p class="text-teal-600/70 text-sm mt-2 font-medium">定制你的专属薄荷音色</p>
        </div>

        <div class="p-6 space-y-6">
            <!-- 步骤 1: 音频输入 -->
            <div>
                <h2 class="text-xs font-bold text-teal-500 mb-3 tracking-widest uppercase">1. 输入音频</h2>
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex flex-col items-center justify-center bg-cyan-50/50 hover:bg-cyan-50 border-2 border-dashed border-cyan-100 hover:border-cyan-300 rounded-2xl p-4 cursor-pointer transition-colors group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-cyan-400 group-hover:text-cyan-500 mb-2 transition-colors"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" x2="12" y1="3" y2="15"></line></svg>
                        <span class="text-sm text-cyan-600/70 group-hover:text-cyan-600 font-medium transition-colors">上传音频</span>
                        <input type="file" id="fileInput" accept="audio/*">
                        <!-- 隐藏的参考音频输入框，用于提取音色 -->
                        <input type="file" id="refFileInput" accept="audio/*" style="display: none;">
                    </label>

                    <button id="recordBtn" class="flex flex-col items-center justify-center bg-emerald-50/50 hover:bg-emerald-50 border-2 border-dashed border-emerald-100 hover:border-emerald-300 rounded-2xl p-4 transition-colors group relative">
                        <div id="recordIconWrapper" class="mb-2 text-emerald-400 group-hover:text-emerald-500 rounded-full p-1 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="micIcon"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                        </div>
                        <span id="recordText" class="text-sm text-emerald-600/70 group-hover:text-emerald-600 font-medium transition-colors">按住录音</span>
                    </button>
                </div>

                <!-- 文本转语音输入框 -->
                <div class="mt-4 pt-4 border-t border-teal-50">
                    <label class="text-xs font-bold text-teal-500 mb-2 flex items-center gap-1 uppercase tracking-widest">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path></svg>
                        或者输入文本讲话
                    </label>
                    <div class="flex gap-2">
                        <input type="text" id="textInput" class="flex-1 bg-teal-50/30 border border-teal-100 hover:border-teal-200 rounded-2xl px-4 py-2 text-sm text-teal-700 focus:outline-none focus:border-teal-300 focus:ring-2 focus:ring-teal-100 transition-all placeholder-teal-400/60" placeholder="想说些什么甜蜜的话...">
                        <button id="ttsBtn" class="bg-teal-100 hover:bg-teal-200 text-teal-700 px-4 py-2 rounded-2xl text-sm font-semibold transition-colors whitespace-nowrap flex items-center gap-1 shadow-sm">
                            生成语音
                        </button>
                    </div>
                </div>
                
                <!-- 状态提示 -->
                <div id="statusBox" class="mt-3 text-center text-sm text-teal-500 bg-teal-50 rounded-xl py-2 hidden border border-teal-100">
                    等待输入音频...
                </div>
            </div>

            <!-- 步骤 2: 选择音色 -->
            <div id="effectsSection" class="opacity-50 pointer-events-none transition-opacity duration-300">
                <h2 class="text-xs font-bold text-teal-500 mb-3 tracking-widest uppercase">2. 选择变声音效</h2>
                <div class="grid grid-cols-3 gap-2" id="effectGrid">
                    <!-- 音效按钮将通过 JS 初始化 -->
                </div>
            </div>

            <!-- 步骤 3: 播放与下载 -->
            <div id="actionsSection" class="opacity-50 pointer-events-none transition-opacity duration-300 border-t border-teal-50 pt-6">
                <h2 class="text-xs font-bold text-teal-500 mb-3 tracking-widest uppercase">3. 播放与导出</h2>
                <div class="flex gap-3">
                    <button id="playBtn" class="flex-1 bg-gradient-to-r from-teal-400 to-emerald-400 hover:from-teal-500 hover:to-emerald-500 text-white py-3 px-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition-all shadow-md shadow-emerald-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        <span id="playText">播放试听</span>
                    </button>
                    <button id="downloadBtn" class="flex-1 bg-gradient-to-r from-cyan-400 to-blue-400 hover:from-cyan-500 hover:to-blue-500 text-white py-3 px-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition-all shadow-md shadow-cyan-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                        保存下载
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 状态与全局变量 ---
        let audioContext = null;
        let originalBuffer = null;
        let processedBuffer = null;
        let currentSource = null;
        let isPlaying = false;
        let currentEffect = 'normal';
        let clonePlaybackRate = 1.0; // 存储提取到的音调比率
        
        // 录音相关
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // --- DOM 元素 ---
        const fileInput = document.getElementById('fileInput');
        const recordBtn = document.getElementById('recordBtn');
        const recordText = document.getElementById('recordText');
        const recordIconWrapper = document.getElementById('recordIconWrapper');
        const textInput = document.getElementById('textInput');
        const ttsBtn = document.getElementById('ttsBtn');
        const statusBox = document.getElementById('statusBox');
        const effectsSection = document.getElementById('effectsSection');
        const actionsSection = document.getElementById('actionsSection');
        const effectGrid = document.getElementById('effectGrid');
        const playBtn = document.getElementById('playBtn');
        const playText = document.getElementById('playText');
        const playIcon = document.getElementById('playIcon');
        const downloadBtn = document.getElementById('downloadBtn');
        const refFileInput = document.getElementById('refFileInput');

        // --- 变声音效配置 ---
        const effects = [
            { id: 'normal', name: '原声', icon: '😐' },
            { id: 'gentle_female', name: '柔美女声', icon: '👩' },
            { id: 'loli', name: '萝莉 (女声)', icon: '👧' },
            { id: 'uncle', name: '大叔 (男声)', icon: '🧔' },
            { id: 'goofy_male', name: '笨蛋男声', icon: '🤪' },
            { id: 'chipmunk', name: '花栗鼠', icon: '🐿️' },
            { id: 'robot', name: '机器人', icon: '🤖' },
            { id: 'cave', name: '空谷回音', icon: '🦇' },
            { id: 'clone', name: '提取音色', icon: '✨' }
        ];

        // --- 初始化 UI ---
        function initEffectsUI() {
            effects.forEach(eff => {
                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all ${
                    eff.id === currentEffect 
                    ? 'border-teal-300 bg-teal-50 shadow-sm' 
                    : 'border-transparent bg-gray-50 hover:border-teal-200 hover:bg-teal-50/50'
                }`;
                btn.onclick = () => selectEffect(eff.id, btn);
                btn.innerHTML = `
                    <span class="text-2xl mb-1">${eff.icon}</span>
                    <span class="text-xs font-semibold ${eff.id === currentEffect ? 'text-teal-600' : 'text-gray-500'}">${eff.name}</span>
                `;
                effectGrid.appendChild(btn);
            });
        }
        initEffectsUI();

        // --- 核心工具函数 ---

        // 获取 AudioContext (需在用户交互后调用)
        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }

        // 全局唤醒 AudioContext (解决移动端特别是 iOS 的自动播放限制)
        function unlockAudioContextForMobile() {
            const ctx = getAudioContext();
            if (ctx.state === 'suspended') {
                ctx.resume();
            }
            // 创建一段极短的静音用于解锁底层音频限制
            const buffer = ctx.createBuffer(1, 1, 22050);
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            source.connect(ctx.destination);
            if (source.start) source.start(0);
            else source.noteOn(0);

            // 解锁一次后移除事件监听
            document.removeEventListener('touchstart', unlockAudioContextForMobile);
            document.removeEventListener('click', unlockAudioContextForMobile);
        }
        document.addEventListener('touchstart', unlockAudioContextForMobile, { once: true });
        document.addEventListener('click', unlockAudioContextForMobile, { once: true });

        // 为了兼容旧版 Safari，封装更为安全的 decodeAudioData 函数
        function safeDecodeAudioData(ctx, arrayBuffer) {
            return new Promise((resolve, reject) => {
                // 回调函数方式在旧版 iOS Safari 中最可靠
                ctx.decodeAudioData(arrayBuffer, resolve, reject);
            });
        }

        // 显示状态信息
        function showStatus(text, isError = false) {
            statusBox.style.display = 'block';
            statusBox.textContent = text;
            statusBox.className = `mt-3 text-center text-sm rounded-xl py-2 font-medium border ${
                isError ? 'bg-red-50 text-red-500 border-red-100' : 'bg-teal-50 text-teal-500 border-teal-100'
            }`;
        }

        // 启用后续操作面板
        function enableControls() {
            effectsSection.classList.remove('opacity-50', 'pointer-events-none');
            actionsSection.classList.remove('opacity-50', 'pointer-events-none');
            showStatus('音频已就绪，请选择音色或直接播放。');
        }

        // 停止当前播放
        function stopPlayback() {
            if (currentSource && isPlaying) {
                try { currentSource.stop(); } catch(e) {}
                currentSource = null;
            }
            isPlaying = false;
            playText.textContent = '播放试听';
            playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
            playBtn.className = 'flex-1 bg-gradient-to-r from-teal-400 to-emerald-400 hover:from-teal-500 hover:to-emerald-500 text-white py-3 px-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition-all shadow-md shadow-emerald-200';
            playIcon.parentElement.classList.remove('playing-pulse');
        }

        // --- 事件监听：文件上传 ---
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            stopPlayback();
            showStatus('正在解析音频文件...');
            
            try {
                const ctx = getAudioContext();
                const arrayBuffer = await file.arrayBuffer();
                originalBuffer = await safeDecodeAudioData(ctx, arrayBuffer); // 使用兼容模式解码
                
                // 默认使用原声处理一遍
                await applyEffect('normal');
                enableControls();
                fileInput.value = ''; // 重置 input
            } catch (err) {
                showStatus('解析音频失败，请更换格式重试。', true);
                console.warn('File decoding error:', err);
            }
        });

        // --- 事件监听：麦克风录音 ---
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); getAudioContext(); startRecording(); });
        
        window.addEventListener('mouseup', stopRecording);
        window.addEventListener('touchend', stopRecording);

        async function startRecording() {
            if (isRecording) return;
            stopPlayback();
            
            // 检查浏览器是否支持录音 API
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showStatus('当前环境或浏览器不支持录音，请使用上传音频或文本转语音功能。', true);
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 自动选择设备支持的最优格式，修复 iOS 强转 webm 失败的问题
                let options = {};
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                    options.mimeType = 'audio/webm;codecs=opus';
                } else if (MediaRecorder.isTypeSupported('audio/mp4;codecs=mp4a.40.2')) {
                    options.mimeType = 'audio/mp4;codecs=mp4a.40.2';
                }
                
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    // 使用媒体录制器原生的 mimeType（iOS 通常为 audio/mp4），避免强制写入 webm 导致无法解析
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || '' });
                    
                    const arrayBuffer = await blob.arrayBuffer();
                    const ctx = getAudioContext();
                    try {
                        originalBuffer = await safeDecodeAudioData(ctx, arrayBuffer); // 兼容性解码
                        await applyEffect('normal');
                        enableControls();
                    } catch (decodeErr) {
                        showStatus('录音解析失败，您的设备可能不支持此格式。', true);
                        console.warn('Decode Error:', decodeErr);
                    }
                    
                    // 停止所有音频轨道释放麦克风
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                
                // 更新 UI
                recordText.textContent = '松开结束';
                recordText.classList.replace('text-emerald-600/70', 'text-emerald-500');
                recordBtn.classList.add('border-emerald-300', 'bg-emerald-100/50');
                recordIconWrapper.classList.add('recording-pulse', 'text-emerald-500');

                showStatus('正在录音...');

            } catch (err) {
                // 如果用户拒绝权限，或者当前的 iframe 环境 (Canvas) 阻止了麦克风权限，会抛出此错误。
                if (err.name === 'NotAllowedError' || err.name === 'SecurityError') {
                    showStatus('预览环境受限或您拒绝了麦克风权限。请上传音频文件或使用输入文本功能。', true);
                } else {
                    showStatus('无法访问麦克风，请检查权限。', true);
                }
                // 使用 console.warn 替代 console.error 避免触发预览环境拦截器的错误弹窗
                console.warn('Microphone access denied or restricted by environment:', err);
            }
        }

        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            
            mediaRecorder.stop();
            isRecording = false;
            
            // 恢复 UI
            recordText.textContent = '按住录音';
            recordText.classList.replace('text-emerald-500', 'text-emerald-600/70');
            recordBtn.classList.remove('border-emerald-300', 'bg-emerald-100/50');
            recordIconWrapper.classList.remove('recording-pulse', 'text-emerald-500');
            
            showStatus('正在处理录音...');
        }

        // --- 文本转语音 (TTS) 逻辑 ---
        const apiKey = ""; 
        
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        ttsBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) {
                showStatus("请输入要转换的文本！", true);
                return;
            }

            stopPlayback();
            showStatus('正在呼叫 AI 生成语音...');
            ttsBtn.disabled = true;
            ttsBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } // 使用一个自然清澈的女声作为底模
                        }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const inlineData = result?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                if (!inlineData) throw new Error("API 未返回音频数据");

                const mimeType = inlineData.mimeType;
                const base64Data = inlineData.data;

                // 从 mimeType 提取采样率，默认为 24000
                let sampleRate = 24000;
                const rateMatch = mimeType.match(/rate=(\d+)/);
                if (rateMatch) {
                    sampleRate = parseInt(rateMatch[1], 10);
                }

                // Base64 解码并转为 Float32Array (将 PCM16 格式数据解析至 AudioBuffer)
                const binaryString = atob(base64Data);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const dataView = new DataView(bytes.buffer);
                const numSamples = len / 2;
                const audioData = new Float32Array(numSamples);

                // 读取 16-bit PCM (小端序) 并转换为 Float32 (-1.0 到 1.0 之间)
                for (let i = 0; i < numSamples; i++) {
                    const int16 = dataView.getInt16(i * 2, true); 
                    audioData[i] = int16 < 0 ? int16 / 32768 : int16 / 32767;
                }

                // 生成浏览器通用的 AudioBuffer 数据结构
                const ctx = getAudioContext();
                const audioBuffer = ctx.createBuffer(1, numSamples, sampleRate);
                audioBuffer.getChannelData(0).set(audioData);

                // 赋值为原始音频并执行变声流水线
                originalBuffer = audioBuffer;
                
                await applyEffect('normal');
                enableControls();
                
                showStatus('语音生成成功！请选择音色或播放。');
            } catch (error) {
                console.warn('TTS Error:', error);
                showStatus('语音生成失败，请检查网络或重试。', true);
            } finally {
                ttsBtn.disabled = false;
                ttsBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        // --- 音频处理引擎 (离线渲染) ---
        async function applyEffect(effectId) {
            if (!originalBuffer) return;
            
            showStatus('正在渲染音效...');
            
            const ctx = getAudioContext();
            
            // 计算渲染参数
            let duration = originalBuffer.duration;
            let playbackRate = 1.0;
            
            if (effectId === 'uncle') playbackRate = 0.7;      // 大叔：减速降调
            if (effectId === 'gentle_female') playbackRate = 1.15; // 柔美女声：微弱升调
            if (effectId === 'loli') playbackRate = 1.4;       // 萝莉：加速升调
            if (effectId === 'goofy_male') playbackRate = 0.85; // 笨蛋男声：微弱降调
            if (effectId === 'chipmunk') playbackRate = 2.0;   // 花栗鼠：极速升调
            if (effectId === 'clone') playbackRate = clonePlaybackRate; // 克隆提取的音调
            
            // 计算新时长以容纳变速后的音频，如果是回声则增加 2 秒尾音
            let offlineDuration = duration / playbackRate + (effectId === 'cave' ? 2 : 0);
            
            // 创建离线音频上下文
            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(
                originalBuffer.numberOfChannels,
                offlineCtxLength = offlineCtxSampleRate = 44100 * offlineDuration,
                44100
            );

            const source = offlineCtx.createBufferSource();
            source.buffer = originalBuffer;
            source.playbackRate.value = playbackRate;

            // 构建音频处理图
            switch (effectId) {
                case 'normal':
                case 'chipmunk':
                case 'clone':
                    source.connect(offlineCtx.destination);
                    break;
                    
                case 'gentle_female':
                    // 柔美女声：过滤掉一些低频的浑厚感，让声音更清亮
                    const highpass = offlineCtx.createBiquadFilter();
                    highpass.type = 'highpass';
                    highpass.frequency.value = 180; 
                    source.connect(highpass);
                    highpass.connect(offlineCtx.destination);
                    break;

                case 'goofy_male':
                    // 笨蛋男声：增加中频的鼻音感/共鸣感，让声音听起来憨憨的
                    const peaking = offlineCtx.createBiquadFilter();
                    peaking.type = 'peaking';
                    peaking.frequency.value = 800;
                    peaking.Q.value = 1.5;
                    peaking.gain.value = 6;
                    source.connect(peaking);
                    peaking.connect(offlineCtx.destination);
                    break;

                case 'uncle':
                    // 稍微增加低音
                    const lowEq = offlineCtx.createBiquadFilter();
                    lowEq.type = 'lowshelf';
                    lowEq.frequency.value = 300;
                    lowEq.gain.value = 5;
                    source.connect(lowEq);
                    lowEq.connect(offlineCtx.destination);
                    break;

                case 'loli':
                    // 稍微增加高音
                    const highEq = offlineCtx.createBiquadFilter();
                    highEq.type = 'highshelf';
                    highEq.frequency.value = 2000;
                    highEq.gain.value = 5;
                    source.connect(highEq);
                    highEq.connect(offlineCtx.destination);
                    break;

                case 'robot':
                    // 环形调制 (Ring Modulation) 实现机械音
                    const osc = offlineCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 40; // 50Hz 的嗡嗡声
                    
                    const modGain = offlineCtx.createGain();
                    modGain.gain.value = 0; // 初始增益0
                    
                    osc.connect(modGain.gain); // 用振荡器控制增益
                    source.connect(modGain);
                    modGain.connect(offlineCtx.destination);
                    
                    osc.start();
                    break;

                case 'cave':
                    // 延迟与反馈实现空谷回音
                    const delay = offlineCtx.createDelay();
                    delay.delayTime.value = 0.3; // 300ms 延迟
                    
                    const feedback = offlineCtx.createGain();
                    feedback.gain.value = 0.4; // 衰减
                    
                    // 原声直达
                    source.connect(offlineCtx.destination);
                    
                    // 延迟回路
                    source.connect(delay);
                    delay.connect(feedback);
                    feedback.connect(delay); // 形成循环反馈
                    delay.connect(offlineCtx.destination);
                    break;
            }

            source.start(0);

            // 执行渲染
            try {
                processedBuffer = await offlineCtx.startRendering();
                showStatus(`已切换至: ${effects.find(e => e.id === effectId).name}`);
            } catch (err) {
                showStatus('渲染音频失败', true);
                console.warn('Render Error:', err);
            }
        }

        // --- 交互逻辑 ---
        async function selectEffect(effectId, buttonElement) {
            if (!originalBuffer || isPlaying) stopPlayback();
            
            if (effectId === 'clone') {
                showStatus('请选择一个你想模仿的参考音频文件...');
                refFileInput.click(); // 触发隐藏的文件选择器
                return; // 暂不应用音效，等待文件选择完成
            }

            currentEffect = effectId;
            
            // 更新 UI 样式
            const buttons = effectGrid.querySelectorAll('button');
            buttons.forEach((btn, index) => {
                const eff = effects[index];
                if (eff.id === effectId) {
                    btn.className = `flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all border-teal-300 bg-teal-50 shadow-sm`;
                    btn.querySelector('span:last-child').className = 'text-xs font-semibold text-teal-600';
                } else {
                    btn.className = `flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all border-transparent bg-gray-50 hover:border-teal-200 hover:bg-teal-50/50`;
                    btn.querySelector('span:last-child').className = 'text-xs font-semibold text-gray-500';
                }
            });

            // 应用音效 (处理数据)
            playBtn.disabled = true;
            playBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            await applyEffect(effectId);
            
            playBtn.disabled = false;
            playBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // 自动播放预览
            togglePlayback();
        }

        function togglePlayback() {
            if (!processedBuffer) return;

            const ctx = getAudioContext();

            if (isPlaying) {
                stopPlayback();
            } else {
                // 开始播放
                currentSource = ctx.createBufferSource();
                currentSource.buffer = processedBuffer;
                currentSource.connect(ctx.destination);
                
                currentSource.onended = () => {
                    stopPlayback();
                };

                currentSource.start(0);
                isPlaying = true;
                
                // 更新 UI 为停止状态
                playText.textContent = '停止播放';
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>'; // Pause icon
                playBtn.className = 'flex-1 bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white py-3 px-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition-all shadow-md shadow-rose-200 playing-pulse';
            }
        }
        
        playBtn.addEventListener('click', togglePlayback);

        // --- 提取音色(频率估算)逻辑 ---
        refFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showStatus('正在分析参考音频特征...');
            try {
                const ctx = getAudioContext();
                const arrayBuffer = await file.arrayBuffer();
                const refBuffer = await safeDecodeAudioData(ctx, arrayBuffer); // 兼容性解码
                
                // 核心算法：使用过零率(ZCR)进行基础音调的粗略比对
                function getZCR(buf) {
                    const data = buf.getChannelData(0);
                    let crossings = 0;
                    // 为了性能和准确度，只分析音频前5秒的声音特征
                    const checkLen = Math.min(data.length, buf.sampleRate * 5); 
                    for(let i = 1; i < checkLen; i++) {
                        if((data[i-1] < 0 && data[i] >= 0) || (data[i-1] >= 0 && data[i] < 0)) crossings++;
                    }
                    return crossings / (checkLen / buf.sampleRate);
                }

                const srcPitch = getZCR(originalBuffer);
                const refPitch = getZCR(refBuffer);
                
                if(srcPitch > 0 && refPitch > 0) {
                    let rate = refPitch / srcPitch;
                    // 限制变速范围 (0.6倍 ~ 1.8倍)，避免变成完全听不懂的电音或怪物音
                    clonePlaybackRate = Math.max(0.6, Math.min(rate, 1.8)); 
                } else {
                    clonePlaybackRate = 1.0;
                }

                showStatus('分析完成！正在转换至相似音调...');
                
                // 手动更新“提取音色”按钮为选中状态
                currentEffect = 'clone';
                const buttons = effectGrid.querySelectorAll('button');
                buttons.forEach((btn, index) => {
                    const eff = effects[index];
                    if (eff.id === 'clone') {
                        btn.className = `flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all border-teal-300 bg-teal-50 shadow-sm`;
                        btn.querySelector('span:last-child').className = 'text-xs font-semibold text-teal-600';
                    } else {
                        btn.className = `flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all border-transparent bg-gray-50 hover:border-teal-200 hover:bg-teal-50/50`;
                        btn.querySelector('span:last-child').className = 'text-xs font-semibold text-gray-500';
                    }
                });

                // 处理并播放
                await applyEffect('clone');
                togglePlayback();
                
            } catch(err) {
                showStatus('参考音频分析失败，请换个文件试试。', true);
                console.warn('Clone feature error:', err);
            } finally {
                e.target.value = ''; // 清空输入，允许重复点击选择同一个文件
            }
        });

        // --- WAV 导出工具 ---
        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            const result = new Float32Array(buffer.length * numChannels);
            
            // 混合通道数据
            if (numChannels === 2) {
                const left = buffer.getChannelData(0);
                const right = buffer.getChannelData(1);
                for (let i = 0; i < buffer.length; i++) {
                    result[i * 2] = left[i];
                    result[i * 2 + 1] = right[i];
                }
            } else {
                result.set(buffer.getChannelData(0));
            }

            const dataLength = result.length * (bitDepth / 8);
            const arrayBuffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(arrayBuffer);

            // 写入字符串工具函数
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            // 写入 RIFF 头
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(view, 8, 'WAVE');
            
            // 写入 fmt 块
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); // fmt 块大小
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true); // byte rate
            view.setUint16(32, numChannels * (bitDepth / 8), true); // block align
            view.setUint16(34, bitDepth, true);
            
            // 写入 data 块
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);

            // 写入 PCM 采样数据
            let offset = 44;
            for (let i = 0; i < result.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, result[i]));
                // 转换为 16-bit PCM
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        downloadBtn.addEventListener('click', () => {
            if (!processedBuffer) return;
            
            showStatus('正在生成音频文件...');
            downloadBtn.disabled = true;
            downloadBtn.classList.add('opacity-75', 'cursor-not-allowed');

            // 使用 setTimeout 避免阻塞主线程 UI 更新
            setTimeout(() => {
                try {
                    const wavBlob = audioBufferToWav(processedBuffer);
                    const url = URL.createObjectURL(wavBlob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    // 文件名加上当前音效后缀
                    const effectName = effects.find(e => e.id === currentEffect).name.split(' ')[0];
                    a.download = `变声_${effectName}_${new Date().getTime()}.wav`;
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    // 清理
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 100);
                    
                    showStatus('音频下载成功！');
                } catch(e) {
                    showStatus('生成文件失败', true);
                    console.warn('Download error:', e);
                } finally {
                    downloadBtn.disabled = false;
                    downloadBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            }, 50);
        });

    </script>
</body>
